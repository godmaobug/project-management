server:
  port: 8080

spring:
  application:
    name: projmaster
  
  datasource:
    url: jdbc:mysql://localhost:3306/projmaster?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# JWT配置
jwt:
  secret: projmaster-secret-key-2026-secure-jwt-token-for-authentication
  expiration: 86400000  # 24小时

# CORS配置
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: "*"
  max-age: 3600

# 文件上传
file:
  upload:
    path: ./uploads
    max-size: 10MB
