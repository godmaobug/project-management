server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/projmaster?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:projmaster-secret-key-change-in-production}
  expiration: 86400000

logging:
  level:
    com.projmaster: INFO
    org.springframework.security: WARN
